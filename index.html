<!DOCTYPE html>
<html lang="sv">
<head>
<meta charset="UTF-8">
<title>Gaston</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<style>
    * {
        box-sizing: border-box;
    }

    body {
        margin: 0;
        background: #111827;
        font-family: Arial, sans-serif;
        color: white;
        overflow: hidden;
    }

    #gameWrap {
        width: 100vw;
        height: 100vh;
        display: flex;
        justify-content: center;
        align-items: center;
        background: linear-gradient(#172554, #0f172a);
    }

    canvas {
        background: #7dd3fc;
        border: 4px solid #020617;
        image-rendering: pixelated;
        max-width: 100vw;
        max-height: 100vh;
    }

    #info {
        position: fixed;
        top: 10px;
        left: 10px;
        font-size: 14px;
        background: rgba(0,0,0,0.45);
        padding: 8px 10px;
        border-radius: 8px;
        z-index: 10;
    }
</style>
</head>
<body>

<div id="info">
    ← → eller A/D = gå | Space/W/↑ = hoppa | R = starta om
</div>

<div id="gameWrap">
    <canvas id="game" width="960" height="540"></canvas>
</div>

<script>
const canvas = document.getElementById("game");
const ctx = canvas.getContext("2d");

const W = canvas.width;
const H = canvas.height;

let keys = {};
let gameState = "start";
let cameraX = 0;
let coinsCollected = 0;

const gravity = 0.55;
const friction = 0.82;

const player = {
    x: 80,
    y: 300,
    w: 34,
    h: 46,
    vx: 0,
    vy: 0,
    speed: 0.65,
    maxSpeed: 5.2,
    jump: -13,
    onGround: false,
    lives: 3,
    hurtTimer: 0
};

const startX = 80;
const startY = 300;

const platforms = [
    {x: 0, y: 490, w: 900, h: 50},
    {x: 980, y: 490, w: 700, h: 50},
    {x: 1780, y: 490, w: 850, h: 50},
    {x: 2700, y: 490, w: 900, h: 50},

    {x: 260, y: 400, w: 160, h: 24},
    {x: 520, y: 335, w: 150, h: 24},
    {x: 820, y: 380, w: 140, h: 24},
    {x: 1120, y: 405, w: 170, h: 24},
    {x: 1440, y: 340, w: 160, h: 24},
    {x: 1880, y: 385, w: 180, h: 24},
    {x: 2220, y: 325, w: 160, h: 24},
    {x: 2520, y: 405, w: 190, h: 24},
    {x: 2920, y: 360, w: 160, h: 24},
    {x: 3250, y: 310, w: 200, h: 24}
];

const coins = [
    {x: 300, y: 360, taken: false},
    {x: 560, y: 295, taken: false},
    {x: 870, y: 340, taken: false},
    {x: 1160, y: 365, taken: false},
    {x: 1490, y: 300, taken: false},
    {x: 1930, y: 345, taken: false},
    {x: 2270, y: 285, taken: false},
    {x: 2570, y: 365, taken: false},
    {x: 2970, y: 320, taken: false},
    {x: 3320, y: 270, taken: false}
];

const enemies = [
    {x: 680, y: 454, w: 36, h: 36, vx: 1.3, min: 610, max: 850},
    {x: 1320, y: 454, w: 36, h: 36, vx: 1.5, min: 1100, max: 1620},
    {x: 2050, y: 454, w: 36, h: 36, vx: 1.6, min: 1850, max: 2500},
    {x: 3050, y: 454, w: 36, h: 36, vx: 1.8, min: 2800, max: 3520}
];

const goal = {x: 3500, y: 370, w: 35, h: 120};

document.addEventListener("keydown", e => {
    keys[e.key.toLowerCase()] = true;

    if (gameState === "start" && (e.key === "Enter" || e.key === " ")) {
        gameState = "play";
    }

    if (e.key.toLowerCase() === "r") {
        resetGame();
    }
});

document.addEventListener("keyup", e => {
    keys[e.key.toLowerCase()] = false;
});

function resetGame() {
    player.x = startX;
    player.y = startY;
    player.vx = 0;
    player.vy = 0;
    player.lives = 3;
    player.hurtTimer = 0;
    cameraX = 0;
    coinsCollected = 0;
    coins.forEach(c => c.taken = false);
    enemies[0].x = 680;
    enemies[1].x = 1320;
    enemies[2].x = 2050;
    enemies[3].x = 3050;
    gameState = "start";
}

function rectsOverlap(a, b) {
    return a.x < b.x + b.w &&
           a.x + a.w > b.x &&
           a.y < b.y + b.h &&
           a.y + a.h > b.y;
}

function updatePlayer() {
    if (keys["arrowleft"] || keys["a"]) player.vx -= player.speed;
    if (keys["arrowright"] || keys["d"]) player.vx += player.speed;

    if (player.vx > player.maxSpeed) player.vx = player.maxSpeed;
    if (player.vx < -player.maxSpeed) player.vx = -player.maxSpeed;

    if ((keys[" "] || keys["w"] || keys["arrowup"]) && player.onGround) {
        player.vy = player.jump;
        player.onGround = false;
    }

    player.vy += gravity;
    player.x += player.vx;
    player.y += player.vy;
    player.vx *= friction;

    player.onGround = false;

    for (const p of platforms) {
        if (rectsOverlap(player, p)) {
            if (player.vy > 0 && player.y + player.h - player.vy <= p.y) {
                player.y = p.y - player.h;
                player.vy = 0;
                player.onGround = true;
            } else if (player.vy < 0 && player.y >= p.y + p.h - 8) {
                player.y = p.y + p.h;
                player.vy = 0;
            } else if (player.vx > 0) {
                player.x = p.x - player.w;
            } else if (player.vx < 0) {
                player.x = p.x + p.w;
            }
        }
    }

    if (player.y > H + 150) {
        loseLife();
    }

    if (player.hurtTimer > 0) player.hurtTimer--;
}

function updateEnemies() {
    for (const e of enemies) {
        e.x += e.vx;

        if (e.x < e.min || e.x > e.max) {
            e.vx *= -1;
        }

        if (rectsOverlap(player, e) && player.hurtTimer <= 0) {
            if (player.vy > 0 && player.y + player.h < e.y + 18) {
                e.x = -9999;
                player.vy = -9;
            } else {
                loseLife();
            }
        }
    }
}

function updateCoins() {
    for (const c of coins) {
        if (!c.taken) {
            const coinRect = {x: c.x, y: c.y, w: 26, h: 26};
            if (rectsOverlap(player, coinRect)) {
                c.taken = true;
                coinsCollected++;
            }
        }
    }
}

function loseLife() {
    player.lives--;
    player.x = Math.max(startX, player.x - 180);
    player.y = startY;
    player.vx = 0;
    player.vy = 0;
    player.hurtTimer = 90;

    if (player.lives <= 0) {
        gameState = "gameover";
    }
}

function updateCamera() {
    cameraX = player.x - W * 0.35;
    if (cameraX < 0) cameraX = 0;
    if (cameraX > 2800) cameraX = 2800;
}

function checkGoal() {
    if (rectsOverlap(player, goal)) {
        gameState = "win";
    }
}

function drawBackground() {
    const sky = ctx.createLinearGradient(0, 0, 0, H);
    sky.addColorStop(0, "#7dd3fc");
    sky.addColorStop(1, "#dbeafe");
    ctx.fillStyle = sky;
    ctx.fillRect(0, 0, W, H);

    ctx.fillStyle = "#bae6fd";
    for (let i = 0; i < 12; i++) {
        let x = (i * 360 - cameraX * 0.25) % 1400;
        if (x < -200) x += 1400;
        ctx.beginPath();
        ctx.arc(x, 95 + (i % 3) * 35, 32, 0, Math.PI * 2);
        ctx.arc(x + 38, 95 + (i % 3) * 35, 42, 0, Math.PI * 2);
        ctx.arc(x + 85, 95 + (i % 3) * 35, 30, 0, Math.PI * 2);
        ctx.fill();
    }

    ctx.fillStyle = "#0f766e";
    for (let i = 0; i < 20; i++) {
        let x = i * 240 - cameraX * 0.45;
        ctx.beginPath();
        ctx.moveTo(x, 490);
        ctx.lineTo(x + 160, 230 + (i % 4) * 30);
        ctx.lineTo(x + 320, 490);
        ctx.closePath();
        ctx.fill();
    }
}

function drawPlatforms() {
    for (const p of platforms) {
        ctx.fillStyle = "#92400e";
        ctx.fillRect(p.x - cameraX, p.y, p.w, p.h);

        ctx.fillStyle = "#22c55e";
        ctx.fillRect(p.x - cameraX, p.y, p.w, 10);

        ctx.fillStyle = "rgba(0,0,0,0.18)";
        for (let x = p.x; x < p.x + p.w; x += 40) {
            ctx.fillRect(x - cameraX, p.y + 16, 22, 4);
        }
    }
}

function drawPlayer() {
    const x = player.x - cameraX;
    const y = player.y;

    if (player.hurtTimer > 0 && Math.floor(player.hurtTimer / 6) % 2 === 0) return;

    ctx.fillStyle = "#1d4ed8";
    ctx.fillRect(x + 7, y + 16, 20, 25);

    ctx.fillStyle = "#fbbf24";
    ctx.fillRect(x + 5, y + 2, 24, 20);

    ctx.fillStyle = "#111827";
    ctx.fillRect(x + 21, y + 8, 4, 4);

    ctx.fillStyle = "#7c2d12";
    ctx.fillRect(x + 3, y, 28, 7);

    ctx.fillStyle = "#0f172a";
    ctx.fillRect(x + 5, y + 41, 9, 5);
    ctx.fillRect(x + 21, y + 41, 9, 5);
}

function drawCoins() {
    for (const c of coins) {
        if (!c.taken) {
            const x = c.x - cameraX;
            ctx.fillStyle = "#facc15";
            ctx.beginPath();
            ctx.arc(x + 13, c.y + 13, 13, 0, Math.PI * 2);
            ctx.fill();

            ctx.fillStyle = "#fde68a";
            ctx.fillRect(x + 11, c.y + 4, 4, 18);
        }
    }
}

function drawEnemies() {
    for (const e of enemies) {
        if (e.x < -1000) continue;

        const x = e.x - cameraX;
        ctx.fillStyle = "#7f1d1d";
        ctx.fillRect(x, e.y, e.w, e.h);

        ctx.fillStyle = "#ef4444";
        ctx.fillRect(x + 5, e.y + 5, e.w - 10, e.h - 10);

        ctx.fillStyle = "#111827";
        ctx.fillRect(x + 8, e.y + 11, 5, 5);
        ctx.fillRect(x + 23, e.y + 11, 5, 5);

        ctx.fillStyle = "#020617";
        ctx.fillRect(x + 8, e.y + 30, 9, 6);
        ctx.fillRect(x + 21, e.y + 30, 9, 6);
    }
}

function drawGoal() {
    const x = goal.x - cameraX;

    ctx.fillStyle = "#1f2937";
    ctx.fillRect(x, goal.y, 8, goal.h);

    ctx.fillStyle = "#f97316";
    ctx.fillRect(x + 8, goal.y + 5, 80, 42);

    ctx.fillStyle = "#fed7aa";
    ctx.font = "bold 18px Arial";
    ctx.fillText("MÅL", x + 25, goal.y + 32);
}

function drawHud() {
    ctx.fillStyle = "rgba(15,23,42,0.72)";
    ctx.fillRect(18, 18, 260, 48);

    ctx.fillStyle = "#ffffff";
    ctx.font = "bold 22px Arial";
    ctx.fillText("GASTON", 34, 50);

    ctx.font = "18px Arial";
    ctx.fillText("Mynt: " + coinsCollected + "/" + coins.length, 145, 50);
    ctx.fillText("Liv: " + player.lives, 250, 50);
}

function drawCenteredScreen(title, text, smallText) {
    ctx.fillStyle = "rgba(2,6,23,0.82)";
    ctx.fillRect(0, 0, W, H);

    ctx.fillStyle = "#ffffff";
    ctx.textAlign = "center";
    ctx.font = "bold 72px Arial";
    ctx.fillText(title, W / 2, 190);

    ctx.font = "24px Arial";
    ctx.fillText(text, W / 2, 255);

    ctx.font = "18px Arial";
    ctx.fillStyle = "#cbd5e1";
    ctx.fillText(smallText, W / 2, 305);

    ctx.textAlign = "left";
}

function update() {
    if (gameState === "play") {
        updatePlayer();
        updateEnemies();
        updateCoins();
        updateCamera();
        checkGoal();
    }
}

function draw() {
    drawBackground();
    drawPlatforms();
    drawCoins();
    drawEnemies();
    drawGoal();
    drawPlayer();
    drawHud();

    if (gameState === "start") {
        drawCenteredScreen("GASTON", "Ett enkelt plattformsspel", "Tryck ENTER eller SPACE för att börja");
    }

    if (gameState === "gameover") {
        drawCenteredScreen("GAME OVER", "Gaston förlorade alla liv", "Tryck R för att starta om");
    }

    if (gameState === "win") {
        drawCenteredScreen("BANA KLARAD", "Gaston nådde målet och samlade " + coinsCollected + " mynt", "Tryck R för att spela igen");
    }
}

function loop() {
    update();
    draw();
    requestAnimationFrame(loop);
}

loop();
</script>

</body>
</html>
